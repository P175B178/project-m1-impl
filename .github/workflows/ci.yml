name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container: debian:13-slim
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: /root/.cmake/fetchcontent
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_HARDWARE=OFF \
            -DBUILD_TESTING=ON \
            -DFETCHCONTENT_BASE_DIR=/root/.cmake/fetchcontent

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang-tidy:
    runs-on: ubuntu-24.04
    container: debian:13-slim
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: /root/.cmake/fetchcontent
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            cmake ninja-build git ca-certificates clang clang-tidy

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_HARDWARE=OFF \
            -DBUILD_TESTING=ON \
            -DENABLE_CLANG_TIDY=ON \
            -DFETCHCONTENT_BASE_DIR=/root/.cmake/fetchcontent

      - name: Build (includes clang-tidy)
        run: cmake --build build

  clang-format:
    runs-on: ubuntu-24.04
    container: debian:13-slim
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: apt-get update && apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find include src -name '*.cpp' -o -name '*.hpp' \
            | xargs clang-format --dry-run --Werror
