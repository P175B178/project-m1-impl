# Warden — Environmental Monitor Configuration
# Missing keys fall back to the defaults shown here.

# How often to read the sensor
read_interval_s = 5

# How many samples to average before evaluating thresholds
averaging_window = 10

[thresholds]
# Alert when strictly greater than these values
temperature = 28.0
humidity    = 50.0

[sensor_validation]
# Readings outside these ranges are rejected as implausible
min_temperature = -40.0
max_temperature =  80.0
min_humidity    =   0.0
max_humidity    = 100.0
